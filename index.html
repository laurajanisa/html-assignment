<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Favorite Movies</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: auto;
        padding: 20px;
        line-height: 1.6;
      }

      header,
      footer {
        text-align: center;
      }

      img {
        width: 250px;
        margin: 10px;
        border-radius: 8px;
      }

      section {
        margin-bottom: 30px;
      }

      a {
        color: blue;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>My Favorite Movies</h1>
    </header>

    <main>
      <section>
        <h2>Top 3 Favorite Movies</h2>
        <ul>
          <li>Interstellar</li>
          <li>Inception</li>
          <li>The Dark Knight</li>
        </ul>
      </section>

      <section>
        <h2>Movie Posters</h2>

        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=300" alt="Movie theater screen with audience" width="300" />

        <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=300" alt="People watching a movie in a cinema" width="300" />

        <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=300" alt="Cinema seats facing a large screen" width="300" />
      </section>

      <section>
        <h2>More Information</h2>
        <p>
          To learn more about movies, visit
          <a href="https://www.imdb.com/" target="_blank"> IMDb </a>.
        </p>
      </section>
    </main>

    <footer>
      <p>Created for the Coursera HTML Assignment.</p>
    </footer>
  </body>
</html>
