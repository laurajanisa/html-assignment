<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Interaktif</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
        min-height:100vh;
        background:linear-gradient(135deg,#667eea,#764ba2);
        display:flex;
        justify-content:center;
        align-items:center;
        padding:30px;
    }

    .container{
        width:100%;
        max-width:1000px;
        background:#fff;
        padding:30px;
        border-radius:20px;
        box-shadow:0 15px 40px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:25px;
        color:#333;
    }

    #image{
        width:100%;
        height:350px;
        border-radius:15px;
        border:3px dashed #d6d6d6;
        background-color:#f5f5f5;
        background-size:cover;
        background-position:center;
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        padding:20px;
        font-size:1.2rem;
        color:#555;
        transition:all 0.4s ease;
        margin-bottom:25px;
    }

    .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
        gap:15px;
    }

    .gallery img{
        width:100%;
        height:180px;
        object-fit:cover;
        border-radius:12px;
        cursor:pointer;
        transition:transform 0.3s ease,
                   box-shadow 0.3s ease;
    }

    .gallery img:hover{
        transform:translateY(-5px) scale(1.03);
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }
</style>
</head>

<body>

<div class="container">
    <h1>Galeri Interaktif</h1>

    <div id="image">
        Arahkan kursor ke gambar di bawah ini untuk ditampilkan di sini.
    </div>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
             alt="Pemandangan Pegunungan"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800"
             alt="Pantai yang Indah"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800"
             alt="Hutan Hijau yang Asri"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://images.unsplash.com/photo-1511497584788-876760111969?w=800"
             alt="Danau yang Tenang"
             onmouseover="upDate(this)"
             onmouseout="undo()">
    </div>
</div>

<script>
function upDate(previewPic) {
    console.log("Event triggered!");
    console.log("Alt text:", previewPic.alt);
    console.log("Source:", previewPic.src);

    let imageDiv = document.getElementById("image");

    imageDiv.innerHTML = previewPic.alt;
    imageDiv.style.backgroundImage = "url('" + previewPic.src + "')";
    imageDiv.style.color = "white";
    imageDiv.style.textShadow = "0 2px 10px rgba(0,0,0,0.8)";
}

function undo() {
    let imageDiv = document.getElementById("image");

    imageDiv.innerHTML =
        "Arahkan kursor ke gambar di bawah ini untuk ditampilkan di sini.";

    imageDiv.style.backgroundImage = "url('')";
    imageDiv.style.color = "#555";
    imageDiv.style.textShadow = "none";
}
</script>

</body>
</html>
