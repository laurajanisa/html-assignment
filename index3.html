<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Photo Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:2.5rem;
}

h2{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
    font-weight:400;
}

#image{
    width:100%;
    height:420px;
    border-radius:20px;
    background:#334155;
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    font-size:1.3rem;
    font-weight:600;
    margin-bottom:30px;
    transition:.4s ease;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.preview{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    cursor:pointer;
    transition:.3s ease;
    border:3px solid transparent;
}

.preview:hover,
.preview:focus{
    transform:translateY(-5px);
    border-color:#38bdf8;
    box-shadow:0 10px 25px rgba(56,189,248,.4);
    outline:none;
}

footer{
    text-align:center;
    margin-top:40px;
    color:#94a3b8;
}
</style>
</head>

<body onload="addTabFocus()">

<div class="container">

    <h1>Interactive Photo Gallery</h1>
    <h2>Hover atau gunakan tombol TAB untuk menjelajahi gambar</h2>

    <div id="image">
        Arahkan kursor ke gambar di bawah ini untuk ditampilkan di sini.
    </div>

    <div class="gallery">

        <img
            class="preview"
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200"
            alt="Pegunungan hijau yang indah"
            onmouseover="upDate(this)"
            onmouseleave="undo()"
            onfocus="upDate(this)"
            onblur="undo()">

        <img
            class="preview"
            src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200"
            alt="Pantai dengan ombak yang tenang"
            onmouseover="upDate(this)"
            onmouseleave="undo()"
            onfocus="upDate(this)"
            onblur="undo()">

        <img
            class="preview"
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200"
            alt="Hutan hijau yang asri"
            onmouseover="upDate(this)"
            onmouseleave="undo()"
            onfocus="upDate(this)"
            onblur="undo()">

        <img
            class="preview"
            src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200"
            alt="Danau yang tenang di pagi hari"
            onmouseover="upDate(this)"
            onmouseleave="undo()"
            onfocus="upDate(this)"
            onblur="undo()">

        <img
            class="preview"
            src="https://images.unsplash.com/photo-1510784722466-f2aa9c52fff6?w=1200"
            alt="Air terjun yang mengalir deras"
            onmouseover="upDate(this)"
            onmouseleave="undo()"
            onfocus="upDate(this)"
            onblur="undo()">

        <img
            class="preview"
            src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1200"
            alt="Pemandangan matahari terbenam"
            onmouseover="upDate(this)"
            onmouseleave="undo()"
            onfocus="upDate(this)"
            onblur="undo()">

    </div>

    <footer>
        Accessibility Assignment - Coursera
    </footer>

</div>

<script>

function upDate(previewPic){

    console.log("Mouseover / Focus aktif");
    console.log(previewPic.alt);
    console.log(previewPic.src);

    let imageDiv = document.getElementById("image");

    imageDiv.innerHTML = previewPic.alt;
    imageDiv.style.backgroundImage =
        "url('" + previewPic.src + "')";

    imageDiv.style.color = "white";
    imageDiv.style.textShadow =
        "0 2px 10px rgba(0,0,0,.9)";
}

function undo(){

    console.log("Mouseleave / Blur aktif");

    let imageDiv = document.getElementById("image");

    imageDiv.innerHTML =
        "Arahkan kursor ke gambar di bawah ini untuk ditampilkan di sini.";

    imageDiv.style.backgroundImage = "url('')";
    imageDiv.style.color = "white";
    imageDiv.style.textShadow = "none";
}

function addTabFocus(){

    console.log("Halaman berhasil dimuat");

    let images =
        document.querySelectorAll(".preview");

    for(let i = 0; i < images.length; i++){

        images[i].setAttribute("tabindex","0");

        console.log(
            "Tabindex ditambahkan ke gambar " +
            (i + 1)
        );
    }
}

</script>

</body>
</html>
